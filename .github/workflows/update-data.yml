name: Atualizar dados Comex Stat - GLP-1

on:
  schedule:
    # Executa todo dia às 6h UTC (3h BRT) para sempre pegar a última revisão do Comex Stat
    - cron: '0 6 * * *'
  workflow_dispatch:   # Permite execução manual

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Para poder commitar o JSON atualizado

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests

      - name: Executar script de coleta e processamento
        run: python scripts/fetch_comex.py

      - name: Commitar e enviar JSON atualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Atualização automática dos dados [skip ci]"
          git push
